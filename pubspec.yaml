name: pharmaturk_mobile
description: PharmaTurk Mobile App - Flutter приложение для PharmaTurk

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Networking
  dio: ^5.4.0
  
  # JSON Serialization
  json_annotation: ^4.8.1
  
  # Image Loading
  cached_network_image: ^3.3.1
  
  # Video (баннеры)
  video_player: ^2.9.2
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # UI Components
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  carousel_slider: ^5.0.0
  smooth_page_indicator: ^1.1.0
  
  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.2.4
  open_mail_launcher: ^0.1.2
  flutter_html: ^3.0.0
  image_picker: ^1.0.7
  share_plus: ^7.2.1
  path_provider: ^2.1.2
  
  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Linting
  flutter_lints: ^3.0.1
  
  # Code Generation
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
